server {
    listen ${PORT};
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use the nameserver discovered at startup
    resolver ${NAMESERVER} valid=30s;

    # Dynamic backend address support
    set $backend_url "${API_BACKEND}";

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache hashed files longer
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Internal health check for Nginx itself (at a different path)
    location /_nginx_health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Proxy everything else to the backend (including /api and /health)
    # Using $request_uri ensure the full path is preserved when using dynamic upstreams
    
    location /api/ {
        proxy_pass $backend_url$request_uri;
        proxy_http_version 1.1;
        
        # SSL Support (needed if API_BACKEND uses https)
        proxy_ssl_server_name on;
        proxy_ssl_name ${BACKEND_HOST_ONLY};
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Use the upstream's hostname for the Host header
        proxy_set_header Host $proxy_host;
        
        # Keep original host info in X-Forwarded headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy uploaded media paths to backend so profile/task images work on frontend domain.
    location /uploads/ {
        proxy_pass $backend_url$request_uri;
        proxy_http_version 1.1;

        # SSL Support (needed if API_BACKEND uses https)
        proxy_ssl_server_name on;
        proxy_ssl_name ${BACKEND_HOST_ONLY};

        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Service-level health check for Railway/client container liveness.
    # Keep this local so frontend health is independent from backend availability.
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # WebSocket proxy
    location /socket.io/ {
        proxy_pass $backend_url$request_uri;
        proxy_http_version 1.1;
        
        # SSL Support
        proxy_ssl_server_name on;
        proxy_ssl_name ${BACKEND_HOST_ONLY};
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
